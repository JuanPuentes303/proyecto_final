<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
</head>
<body>
    <div class="container">
        <h2>Registro</h2>

        <input type="text" id="nombre" class="space" placeholder="Nombre">
        <input type="email" id="correo" class="space" placeholder="Correo">
        <input type="password" id="password" class="space" placeholder="Contraseña">
        
        <button onclick="registro()" type="button" class="btn btn-primary"
            style="--bs-btn-padding-y: .25rem; --bs-btn-padding-x: .5rem; --bs-btn-font-size: .75rem;">
            Registrarse
        </button>

        <p class="space">¿Ya tienes cuenta?<a href="login.html">Login</a></p>
    </div>
<script src="../js/registro.js"></script>
</body>
</html>
