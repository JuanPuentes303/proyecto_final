<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo</title>
    <link rel="stylesheet" href="../css/catalogo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    
    <div class="nav">
        <nav>
            <input type="text" id="filtroNombre" placeholder="Buscar">
            <select id="filtroEstado">
                <option value="">Todos</option>
                <option value="disponible">Disponible</option>
                <option value="reservado">Reservado</option>
            </select>

            <button onclick="filtrar()" type="button" class="btn btn-primary"
                style="--bs-btn-padding-y: .25rem; --bs-btn-padding-x: .5rem; --bs-btn-font-size: .75rem;">
                Filtrar
            </button>
        </nav>
    </div>
    
    <div class="catalogo-container">
        <h2>Disfraces destacados</h2>
    <div id="destacados" class="grid-disfraces"></div>

    <h2>Resultados</h2>
    <div id="resultados" class="grid-disfraces"></div>
    </div>

<script src="../js/catalogo.js"></script>
</body>
</html>
